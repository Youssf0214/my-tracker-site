<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي الأول</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #121212;
            color: white;
            padding: 50px;
        }
        h1 {
            color: #00ffcc;
        }
        button {
            background-color: #00ffcc;
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background-color: #00b399;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>مرحباً بك في موقعي الأول! 🎉</h1>
    <p>هذا الموقع مخصص للتجربة واختبار أدوات التتبع.</p>
    
    <br><br>
    
    <!-- زرار تفاعلي عشان نراقب مين هيدوس عليه -->
    <button onclick="alert('شابوه! إنت دوست على الزرار بنجاح 😎')">اضغط هنا للتجربة!</button>

</body>
</html>
