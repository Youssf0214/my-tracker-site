<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة يوسف الفخمة 🌌</title>
    <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xmdp95lggp");
    </script>
    <style>
        /* تصميم فخم باللون الأسود والنيون المضيء */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 90%;
            padding: 40px 25px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            margin: 20px auto;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00ffcc, #0077ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
        }

        p {
            color: #b3b3b3;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* الزر الرئيسي التفاعلي للتتبع */
        .btn-main {
            background: linear-gradient(45deg, #00ffcc, #0077ff);
            color: #000;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 17px;
            cursor: pointer;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.3);
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 255, 204, 0.5);
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            margin: 25px 0;
        }

        .links-title {
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        /* تصميم أزرار المواقع الأخرى */
        .links-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px;
            font-size: 14px;
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.3s ease;
            display: block;
            font-weight: 500;
        }

        .btn-secondary:hover {
            background: rgba(0, 255, 204, 0.05);
            border-color: #00ffcc;
            color: #00ffcc;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>بوابة يوسف الخاصة 🌌</h1>
        <p>مرحباً بك في موقعي الفخم الجديد. من هنا يمكنك تجربة زر التتبع التفاعلي أو الانتقال لأهم منصات الويب.</p>
        
        <button class="btn-main" onclick="alert('شابوه! تم تسجيل ضغطتك بنجاح في نظام المراقبة 🕵️‍♂️')">اضغط هنا للتجربة واختبار المراقبة!</button>
        
        <div class="divider"></div>
        
        <div class="links-title">مواقع وتطبيقات تهمك</div>
        
        <div class="links-grid">
            <a href="https://www.google.com" target="_blank" class="btn-secondary">جوجل 🔍</a>
            <a href="https://www.youtube.com" target="_blank" class="btn-secondary">يوتيوب 📺</a>
            <a href="https://github.com" target="_blank" class="btn-secondary">جيت هاب 💻</a>
            <a href="https://clarity.microsoft.com" target="_blank" class="btn-secondary">لوحة التحكم 📊</a>
        </div>
    </div>

</body>
</html>
