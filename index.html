<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة يوسف الفخمة 🌌</title>
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "xmswsrjhal");
</script>
    
    <style>
        /* تصميم فخم باللون الأسود السادة والنيون المضيء */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #000000; /* أسود سادة فخم */
            color: #ffffff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 420px;
            width: 90%;
            padding: 40px 30px;
            background: #0a0a0a; /* لون رمادي داكن جداً ومميز للمربع */
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
            margin: 20px auto;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #00ffcc, #0077ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #777777;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* تصميم خانات الإدخال الفخمة (Input Fields) */
        .input-group {
            text-align: right;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #b3b3b3;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-field {
            width: 100%;
            padding: 14px 15px;
            font-size: 15px;
            background-color: #121212;
            border: 1.5px solid #222222;
            border-radius: 10px;
            color: #ffffff;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* تأثير التوهج الفسفوري عند الضغط على الخانة */
        .input-field:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.15);
            background-color: #151515;
        }

        /* الزر الرئيسي التفاعلي للتتبع */
        .btn-main {
            background: linear-gradient(45deg, #00ffcc, #0077ff);
            color: #000;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.2);
            transition: all 0.3s ease;
            margin-top: 10px;
            margin-bottom: 25px;
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 204, 0.4);
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            margin: 25px 0;
        }

        .links-title {
            font-size: 12px;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        /* تصميم أزرار المواقع الأخرى */
        .links-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-secondary {
            background: #111111;
            color: #888888;
            border: 1px solid #222222;
            padding: 12px;
            font-size: 13px;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: block;
            font-weight: 500;
        }

        .btn-secondary:hover {
            background: rgba(0, 255, 204, 0.03);
            border-color: #00ffcc;
            color: #00ffcc;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>بوابة يوسف الخاصة 🌌</h1>
        <p>قم بتسجيل الدخول للاختبار واستكشاف الروابط الفخمة.</p>
        
        <!-- خانة اسم المستخدم -->
        <div class="input-group">
            <label for="username">اسم المستخدم</label>
            <input type="text" id="username" class="input-field" placeholder="أدخل اسم المستخدم هنا...">
        </div>

        <!-- خانة كلمة السر -->
        <div class="input-group">
            <label for="password">كلمة السر</label>
            <input type="password" id="password" class="input-field" placeholder="أدخل كلمة السر هنا...">
        </div>

        <!-- زر تسجيل دخول تفاعلي للتتبع -->
        <button class="btn-main" onclick="alert('أهلاً بك! تم اختبار تسجيل الدخول وتوثيق الحركة بنجاح 🕵️‍♂️')">تسجيل دخول</button>
        
        <div class="divider"></div>
        
        <div class="links-title">روابط سريعة تفيدك</div>
        
        <!-- شبكة الأزرار التي تؤدي لمواقع أخرى -->
        <div class="links-grid">
            <a href="https://www.google.com" target="_blank" class="btn-secondary">جوجل 🔍</a>
            <a href="https://www.youtube.com" target="_blank" class="btn-secondary">يوتيوب 📺</a>
            <a href="https://github.com" target="_blank" class="btn-secondary">جيت هاب 💻</a>
            <a href="https://clarity.microsoft.com" target="_blank" class="btn-secondary">لوحة التحكم 📊</a>
        </div>
    </div>

</body>
</html>
